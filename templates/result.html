<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{url_for('static',filename='styles.css')}}">
    <title>Result</title>
</head>
<body id="result">
    <div id="container">
        <h2>Predicted Result: </h2>
        <p>{{result}}</p>
        {%if prob <20 %}
            <p style="color: green;">Low Risk:{{prob}}%</p>
        {% elif prob <60 %}
            <p style="color: orange;">Moderate Risk:{{prob}}%</p>
        {% else %}
            <p style="color: red;">High Risk:{{prob}}%</p>
        {% endif %}
        <a href="/">Predict Again</a>
        <!-- <a href="/logout" id="index-logout">Logout</a> -->
        <a href="/download">Download Report</a>
    <div/>
    
</body>
</html>
